<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imaginedle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo_imagine.webp">
    <!-- Bonjour dos! -->
</head>
<body>
    <h1>Imaginedle</h1>
    <img id="logo" src="assets/logo_imagine.webp">
    <div id="input-container">
        <div id="input-wrapper">
            <input type="text" placeholder="Saisir un nom">
            <div id="suggestions"></div>
        </div>
        <button id="hintBtn" style="display: none;">Hint (0/5)</button>
    </div>
    <div id="results">
        <div id="header" style="display: none;">
            <div class="name">Name</div>
            <div class="sex">Genre</div>
            <div class="ues">Participe dans les UE</div>
            <div class="firstPub">Année de 1e publication</div>
            <div class="team">Équipe</div>
        </div>
        <div id="rows">
            <!--div class="row">
                <div class="name">Name</div>
                <div class="sex">Genre</div>
                <div class="ues">Participe dans les UE</div>
                <div class="firstPub">Année de 1e publication</div>
                <div class="team">Équipe</div>
            </div-->
        </div>
    </div>
    <div id="win" style="display: none;">

    </div>

    <footer>
        Des suggestions, corrections ? Contactez-moi sur discord (kuurp) ou faites une <a href="https://github.com/Kuuro-neko/Imaginedle/issues" target="_blank">issue / pull request</a>
    </footer>
    
    <script src="script.js"></script>
    <script src="stats.js"></script>
</body>

</html>
