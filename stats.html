<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imaginedle - Stats</title>
    <link rel="icon" type="image/png" href="assets/logo_imagine.webp">
    <style>
        @font-face {
            font-family: "FSEX300";
            src: url("assets/FSEX300.ttf");
        }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px 16px 40px;
        }
        * {
            font-family: "FSEX300", sans-serif;
        }
        #stats-container {
            width: min(100%, 900px);
        }
        .stats-block {
            width: 100%;
        }
        .stats-block svg {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Imaginedle - Stats</h1>
    <div id="stats-container"></div>
    <script src="script.js"></script>
    <script src="stats.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            showStats(document.getElementById('stats-container'));
        });
    </script>
</body>
</html>
